# docker-compose.override.yml
# Mounts the project_data plugin and updated app/models into the container.
# Run: docker-compose up -d (this file is loaded automatically)
version: "3.4"
services:
  webapp:
    volumes:
      - ./coreplugins/project_data:/webodm/coreplugins/project_data:ro
      - ./coreplugins/roof_detect:/webodm/coreplugins/roof_detect:ro
      - ./coreplugins/realign:/webodm/coreplugins/realign
      - ./app/models/__init__.py:/webodm/app/models/__init__.py:ro
      - ./app/models/redirect.py:/webodm/app/models/redirect.py:ro
  worker:
    entrypoint: /bin/bash -c "pip install laspy pygltflib -q && /webodm/wait-for-postgres.sh db /webodm/wait-for-it.sh -t 0 broker:6379 -- /webodm/wait-for-it.sh -t 0 webapp:8000 -- /webodm/worker.sh start"
    volumes:
      - ./coreplugins/project_data:/webodm/coreplugins/project_data:ro
      - ./coreplugins/roof_detect:/webodm/coreplugins/roof_detect:ro
      - ./coreplugins/realign:/webodm/coreplugins/realign
      - ./app/models/__init__.py:/webodm/app/models/__init__.py:ro
      - ./app/models/redirect.py:/webodm/app/models/redirect.py:ro
      - point2cad_data:/data   # shared with point2cad service

  # point2cad microservice — requires image to be available on the host:
  #   docker load < point2cad.tar   or   docker pull <your-registry>/point2cad:latest
  # Build locally first: cd ~/point2cad/point2cad/build && sh docker_build.sh
  point2cad:
    image: point2cad:latest
    entrypoint: []
    command: python /point2cad_service.py
    volumes:
      - ./coreplugins/roof_detect/point2cad_service.py:/point2cad_service.py:ro
      - point2cad_data:/data
      - ~/point2cad:/work/point2cad:ro
    environment:
      - P2CAD_PORT=8765
      - P2CAD_FORCE_CPU=1   # GTX 1050 has only 2 GiB VRAM — fall back to CPU
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  point2cad_data:
